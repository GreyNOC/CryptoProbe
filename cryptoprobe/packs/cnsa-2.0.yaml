id: cnsa-2.0
title: "CNSA 2.0 — Commercial National Security Algorithm Suite 2.0"
mandate: "NSA CNSA 2.0"
profile: nss
status: active
summary: >
  Quantum-resistant algorithm requirements for U.S. National Security Systems
  (NSS). Mandates ML-KEM-1024 (FIPS 203, Level V), ML-DSA-87 (FIPS 204, Level V),
  AES-256, and SHA-384/512. SLH-DSA is NOT part of CNSA and is not approved for
  any NSS use (the key divergence from federal-civilian guidance).
default_citation: "https://www.nsa.gov/Resources/Commercial-Solutions-for-Classified-Program/CNSA-2-0-Algorithms/"
deadlines:
  new_acquisitions: "2027-01-01"
  exclusive_use_signing_networking: "2030"
  exclusive_use_web_cloud_os: "2033"
  full_transition: "2035"
rules:
  - id: cnsa-tls13
    requirement: "Negotiate TLS 1.3 or a successor version"
    mandate: "EO 14306"
    deadline: "2030-01-02"
    citation: "https://www.federalregister.gov/documents/2025/06/11/2025-10804/sustaining-select-efforts-to-strengthen-the-nations-cybersecurity-and-amending-executive-order-13694"
    severity: HIGH
    when: { fact: reachable, is_true: true }
    assert: { fact: tls13, is_true: true }
    observed: tls_version
    fail_detail: >
      EO 14306 directs federal NSS (via NSA) to support TLS 1.3 or a successor,
      not later than 2030-01-02. This endpoint did not negotiate TLS 1.3.

  - id: cnsa-kex-mlkem1024
    requirement: "Key establishment must use ML-KEM-1024 (FIPS 203, Level V)"
    deadline: "2027-01-01"
    citation: "https://media.defense.gov/2022/Sep/07/2003071836/-1/-1/0/CSI_CNSA_2.0_FAQ_.PDF"
    severity: CRITICAL
    when: { fact: tls13, is_true: true }
    assert: { fact: kex_ml_kem, equals: "ML-KEM-1024" }
    observed: kex_group
    fail_detail: >
      CNSA 2.0 requires ML-KEM-1024 for key establishment. ML-KEM-768 hybrids
      (e.g. X25519MLKEM768) and classical groups do NOT satisfy CNSA; the
      compliant NSS path is SecP384r1MLKEM1024.

  - id: cnsa-sig-mldsa87
    requirement: "Certificate signatures must use ML-DSA-87 (FIPS 204, Level V)"
    deadline: "2027-01-01"
    citation: "https://media.defense.gov/2022/Sep/07/2003071836/-1/-1/0/CSI_CNSA_2.0_FAQ_.PDF"
    severity: HIGH
    when: { fact: sig_class, present: true }
    assert: { fact: sig_canonical, equals: "ML-DSA-87" }
    observed: cert_signature
    fail_detail: >
      CNSA 2.0 mandates ML-DSA-87 for general-purpose signatures. The observed
      certificate uses a classical (Shor-broken) or non-compliant signature.

  - id: cnsa-aes256
    requirement: "Symmetric encryption must be AES-256"
    citation: "https://www.nsa.gov/Resources/Commercial-Solutions-for-Classified-Program/CNSA-2-0-Algorithms/"
    severity: MEDIUM
    when: { fact: bulk_cipher, present: true }
    assert: { fact: bulk_bits, gte: 256 }
    observed: bulk_cipher
    fail_detail: "CNSA 2.0 requires AES-256; a sub-256-bit bulk cipher was negotiated."

  - id: cnsa-sha384
    requirement: "Hashing must be SHA-384 or SHA-512"
    citation: "https://www.nsa.gov/Resources/Commercial-Solutions-for-Classified-Program/CNSA-2-0-Algorithms/"
    severity: MEDIUM
    when: { fact: hash, present: true }
    assert: { fact: hash, in: ["SHA-384", "SHA-512"] }
    observed: hash
    fail_detail: "CNSA 2.0 requires SHA-384 or SHA-512; a weaker hash was negotiated."

  - id: cnsa-no-slh-dsa
    requirement: "SLH-DSA is NOT approved for NSS use"
    citation: "https://media.defense.gov/2022/Sep/07/2003071836/-1/-1/0/CSI_CNSA_2.0_FAQ_.PDF"
    severity: HIGH
    when:
      all:
        - { fact: sig_class, equals: "pqc" }
        - { fact: sig_canonical, contains: "SLH-DSA" }
    assert: { fact: sig_canonical, not_contains: "SLH-DSA" }
    observed: cert_signature
    fail_detail: >
      SLH-DSA is hash-based but is not part of CNSA and is not approved for any
      NSS use. (OMB M-26-15 permits SLH-DSA for federal CIVILIAN systems — this
      is the NSS-vs-civilian divergence.)
