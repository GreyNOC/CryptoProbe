name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag == pyproject == _version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          py=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          ver=$(python -c "import re;print(re.search(r'\"([^\"]+)\"',open('cryptoprobe/_version.py').read()).group(1))")
          echo "tag=$tag pyproject=$py _version=$ver"
          test "$tag" = "$py" && test "$tag" = "$ver"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke-test the wheel
        run: |
          python -m pip install dist/*.whl
          cryptoprobe --version
          cryptoprobe policy verify
          cryptoprobe selftest --offline
      - name: SHA256SUMS
        run: (cd dist && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt)
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: cryptoprobe-linux-x64
          - os: macos-latest
            asset: cryptoprobe-macos-arm64
          - os: windows-latest
            asset: cryptoprobe-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build portable binary
        run: |
          python -m pip install --upgrade pip pyinstaller
          python -m pip install .
          python packaging/build_portable.py --name cp
      - name: Stage asset
        shell: bash
        run: |
          mkdir -p staged
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp portable/cp.exe "staged/${{ matrix.asset }}.exe"
          else
            cp portable/cp "staged/${{ matrix.asset }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staged/*

  publish:
    needs: [dist, portable]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -l release
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
